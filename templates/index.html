<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prediction Form</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f4f6fb; margin: 0; padding: 0; }
      .page { max-width: 950px; margin: 0 auto; padding: 24px; }
      .card { background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 16px 40px rgba(14, 39, 84, 0.08); }
      h1 { margin-top: 0; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; }
      label { display: block; margin-bottom: 8px; font-weight: 600; }
      input, select { width: 100%; padding: 12px 10px; border: 1px solid #d8dde9; border-radius: 8px; background: #fff; }
      .actions { margin-top: 24px; }
      .button { display: inline-flex; align-items: center; justify-content: center; padding: 14px 22px; color: #fff; background: #2e6ef7; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; }
      .button:hover { background: #244dc4; }
      .link { margin-left: 16px; color: #2e6ef7; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <h1>Credit Card Approval Prediction</h1>
        <p>Fill in the applicant's details below and submit to get a prediction.</p>
        <form method="post" action="{{ url_for('predict') }}">
          <div class="grid">
            <div>
              <label for="CODE_GENDER">Gender</label>
              <select id="CODE_GENDER" name="CODE_GENDER" required>
                <option value="M">Male</option>
                <option value="F">Female</option>
              </select>
            </div>

            <div>
              <label for="FLAG_OWN_CAR">Owns Car</label>
              <select id="FLAG_OWN_CAR" name="FLAG_OWN_CAR" required>
                <option value="Y">Yes</option>
                <option value="N">No</option>
              </select>
            </div>

            <div>
              <label for="FLAG_OWN_REALTY">Owns Realty</label>
              <select id="FLAG_OWN_REALTY" name="FLAG_OWN_REALTY" required>
                <option value="Y">Yes</option>
                <option value="N">No</option>
              </select>
            </div>

            <div>
              <label for="CNT_CHILDREN">Children Count</label>
              <input type="number" id="CNT_CHILDREN" name="CNT_CHILDREN" min="0" value="0" required />
            </div>

            <div>
              <label for="AMT_INCOME_TOTAL">Income Total</label>
              <input type="number" id="AMT_INCOME_TOTAL" name="AMT_INCOME_TOTAL" min="0" step="1000" value="150000" required />
            </div>

            <div>
              <label for="NAME_INCOME_TYPE">Income Type</label>
              <select id="NAME_INCOME_TYPE" name="NAME_INCOME_TYPE" required>
                <option value="Working">Working</option>
                <option value="Commercial associate">Commercial associate</option>
                <option value="Pensioner">Pensioner</option>
                <option value="State servant">State servant</option>
                <option value="Student">Student</option>
                <option value="Businessman">Businessman</option>
              </select>
            </div>

            <div>
              <label for="NAME_EDUCATION_TYPE">Education Type</label>
              <select id="NAME_EDUCATION_TYPE" name="NAME_EDUCATION_TYPE" required>
                <option value="Higher education">Higher education</option>
                <option value="Secondary / secondary special">Secondary / secondary special</option>
                <option value="Incomplete higher">Incomplete higher</option>
                <option value="Lower secondary">Lower secondary</option>
                <option value="Academic degree">Academic degree</option>
              </select>
            </div>

            <div>
              <label for="NAME_FAMILY_STATUS">Family Status</label>
              <select id="NAME_FAMILY_STATUS" name="NAME_FAMILY_STATUS" required>
                <option value="Civil marriage">Civil marriage</option>
                <option value="Married">Married</option>
                <option value="Single / not married">Single / not married</option>
                <option value="Separated">Separated</option>
                <option value="Widow">Widow</option>
              </select>
            </div>

            <div>
              <label for="NAME_HOUSING_TYPE">Housing Type</label>
              <select id="NAME_HOUSING_TYPE" name="NAME_HOUSING_TYPE" required>
                <option value="Rented apartment">Rented apartment</option>
                <option value="House / apartment">House / apartment</option>
                <option value="With parents">With parents</option>
                <option value="Municipal apartment">Municipal apartment</option>
                <option value="Co-op apartment">Co-op apartment</option>
                <option value="Office apartment">Office apartment</option>
              </select>
            </div>

            <div>
              <label for="DAYS_BIRTH">Days Birth</label>
              <input type="number" id="DAYS_BIRTH" name="DAYS_BIRTH" value="-12000" required />
            </div>

            <div>
              <label for="DAYS_EMPLOYED">Days Employed</label>
              <input type="number" id="DAYS_EMPLOYED" name="DAYS_EMPLOYED" value="-2000" required />
            </div>

            <div>
              <label for="FLAG_MOBIL">Has Mobile Phone</label>
              <select id="FLAG_MOBIL" name="FLAG_MOBIL" required>
                <option value="1">Yes</option>
                <option value="0">No</option>
              </select>
            </div>

            <div>
              <label for="FLAG_WORK_PHONE">Has Work Phone</label>
              <select id="FLAG_WORK_PHONE" name="FLAG_WORK_PHONE" required>
                <option value="1">Yes</option>
                <option value="0">No</option>
              </select>
            </div>

            <div>
              <label for="FLAG_PHONE">Has Phone</label>
              <select id="FLAG_PHONE" name="FLAG_PHONE" required>
                <option value="1">Yes</option>
                <option value="0">No</option>
              </select>
            </div>

            <div>
              <label for="FLAG_EMAIL">Has Email</label>
              <select id="FLAG_EMAIL" name="FLAG_EMAIL" required>
                <option value="1">Yes</option>
                <option value="0">No</option>
              </select>
            </div>

            <div>
              <label for="OCCUPATION_TYPE">Occupation Type</label>
              <select id="OCCUPATION_TYPE" name="OCCUPATION_TYPE" required>
                <option value="Laborers">Laborers</option>
                <option value="Core staff">Core staff</option>
                <option value="Managers">Managers</option>
                <option value="Drivers">Drivers</option>
                <option value="Sales staff">Sales staff</option>
                <option value="Cleaning staff">Cleaning staff</option>
                <option value="Cooking staff">Cooking staff</option>
                <option value="Private service staff">Private service staff</option>
                <option value="Medicine staff">Medicine staff</option>
                <option value="High skill tech staff">High skill tech staff</option>
                <option value="Accountants">Accountants</option>
                <option value="Security staff">Security staff</option>
                <option value="Waiters/barmen staff">Waiters/barmen staff</option>
                <option value="Low-skill Laborers">Low-skill Laborers</option>
                <option value="Not specified">Not specified</option>
              </select>
            </div>

            <div>
              <label for="CNT_FAM_MEMBERS">Family Members</label>
              <input type="number" id="CNT_FAM_MEMBERS" name="CNT_FAM_MEMBERS" min="1" value="2" required />
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="button">Submit Prediction</button>
            <a class="link" href="{{ url_for('home') }}">Back to Home</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
