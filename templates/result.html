<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prediction Result</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #eef2fb; color: #1a1a1a; }
      .page { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
      .card { background: #fff; border-radius: 14px; padding: 32px; box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08); }
      h1 { margin-top: 0; }
      .result { margin: 24px 0; padding: 22px; border-radius: 12px; background: #f6f8ff; border: 1px solid #d6ddf5; }
      .approved { color: #0f6c24; }
      .rejected { color: #a12020; }
      .actions { margin-top: 28px; }
      .button { display: inline-block; padding: 14px 22px; background: #2e6ef7; color: #fff; border-radius: 8px; text-decoration: none; }
      .button:hover { background: #244dc4; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <h1>Prediction Result</h1>
        <div class="result">
          <p>{{ prediction_text }}</p>
        </div>
        <div class="actions">
          <a class="button" href="{{ url_for('index') }}">Make Another Prediction</a>
        </div>
      </div>
    </div>
  </body>
</html>
